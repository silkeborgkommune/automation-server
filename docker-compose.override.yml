# Development overrides — automatically applied by `docker compose up`
# For production, use: docker compose -f docker-compose.yml up -d

x-worker-dev: &worker-dev-template
  build:
    context: ./worker
    dockerfile: Dockerfile
    target: worker-playwright
  environment:
    ATS_CAPABILITIES: playwright

services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_password}
      POSTGRES_DB: ${POSTGRES_DB:-ats}
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ats_user}:${POSTGRES_PASSWORD:-ats_password}@db:5432/${POSTGRES_DB:-ats}

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      VITE_ATS_API_BASE_URL: /api

  proxy:
    ports:
      - "80:80"

  worker01:
    <<: *worker-dev-template

  worker02:
    <<: *worker-dev-template

  adminer:
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: galkaev
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  frontend_node_modules:
